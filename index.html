<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voidify · Unrestricted AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #06080a;
      color: #d4dce4;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 840px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    .hidden { display: none !important; }

    .login-panel {
      background: #0f1318;
      border: 1px solid #1e2630;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 0 40px rgba(124, 58, 237, 0.2);
      max-width: 400px;
      margin: auto;
    }
    .login-panel h1 {
      font-weight: 700;
      font-size: 2.5rem;
      background: linear-gradient(135deg, #c084fc, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }
    .login-panel p { color: #7e8a99; margin-bottom: 2rem; }
    .input-group { margin-bottom: 1.2rem; text-align: left; }
    .input-group label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #8594a3;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #1a1f28;
      border: 1px solid #25303d;
      border-radius: 0.75rem;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border 0.15s;
    }
    .input-group input:focus { border-color: #8b5cf6; }
    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: #8b5cf6;
      border: none;
      border-radius: 0.75rem;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #7c3aed; }
    .error-msg { color: #f87171; margin-top: 0.8rem; font-size: 0.85rem; }

    .chat-panel {
      background: #0f1318;
      border: 1px solid #1e2630;
      border-radius: 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .chat-header {
      background: #161c24;
      padding: 0.9rem 1.5rem;
      border-bottom: 1px solid #1e2630;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 { font-weight: 600; font-size: 1rem; display: flex; align-items: center; gap: 0.4rem; }
    .chat-header h2 span.user-tag { font-weight: 400; color: #7e8a99; margin-left: 0.4rem; }
    .logout-btn {
      background: transparent;
      border: 1px solid #25303d;
      color: #8594a3;
      padding: 0.3rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.15s;
    }
    .logout-btn:hover { background: #1e2630; border-color: #8b5cf6; }
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      background: #0a0e13;
    }
    .message {
      max-width: 82%;
      padding: 0.7rem 1rem;
      border-radius: 0.9rem;
      line-height: 1.45;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user { align-self: flex-end; background: #7c3aed; color: white; }
    .message.assistant {
      align-self: flex-start;
      background: #1a1f28;
      border: 1px solid #25303d;
    }
    .status-row {
      padding: 0.3rem 1.5rem;
      font-size: 0.75rem;
      color: #6b7280;
      display: flex;
      gap: 0.8rem;
      align-items: center;
    }
    .typing-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #8b5cf6;
      border-radius: 50%;
      animation: pulse 0.7s infinite alternate;
    }
    @keyframes pulse { to { opacity: 0.3; } }
    .input-row {
      display: flex;
      border-top: 1px solid #1e2630;
      background: #161c24;
      padding: 0.7rem 1rem;
      gap: 0.5rem;
    }
    .input-row textarea {
      flex: 1;
      background: #0a0e13;
      border: 1px solid #25303d;
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: #f1f5f9;
      font-size: 0.9rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .input-row textarea:focus { border-color: #8b5cf6; }
    .input-row button {
      background: #8b5cf6;
      border: none;
      border-radius: 0.75rem;
      padding: 0 1.6rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s;
    }
    .input-row button:hover { background: #7c3aed; }
    .input-row button:disabled { background: #25303d; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login -->
    <div id="loginPanel" class="login-panel">
      <h1>Voidify</h1>
      <p>Unrestricted AI Terminal</p>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="diego" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Access Key</label>
        <input type="password" id="keyInput" placeholder="Key" autocomplete="off">
      </div>
      <button class="login-btn" id="loginBtn">Enter Void</button>
      <div id="loginError" class="error-msg"></div>
    </div>

    <!-- Chat -->
    <div id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <h2>● Voidify<span class="user-tag" id="loggedUserDisplay"></span></h2>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
      <div class="output-area" id="outputArea"></div>
      <div class="status-row" id="statusBar">Ready</div>
      <div class="input-row">
        <textarea id="userInput" placeholder="Message Voidify..." rows="1"></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    // ====== LOGIN CREDENTIALS ======
    const AUTH = {
      "diego": "SOdkaofKAjdj",
      "pbs":   "SflielgaHsidhJA"
    };
    const SESS_AUTH = "vfy_auth";
    const SESS_USER = "vfy_user";

    // ====== UNLIMITED.SURF API ======
    const API_KEY = "ua_0pmF5cFsvmZzWRFDH9K5y8WXY0yWz28f";
    const API_URL = "https://unlimited.surf/v1/messages";

    // GPT‑5.5 – pulled from unlimited.surf/api/models
    const MODEL = "gateway-gpt-5-5";

    // ====== DOM ======
    const loginPanel = document.getElementById("loginPanel");
    const chatPanel = document.getElementById("chatPanel");
    const loginBtn = document.getElementById("loginBtn");
    const usernameInput = document.getElementById("usernameInput");
    const keyInput = document.getElementById("keyInput");
    const loginError = document.getElementById("loginError");
    const logoutBtn = document.getElementById("logoutBtn");
    const outputArea = document.getElementById("outputArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusBar = document.getElementById("statusBar");
    const loggedUserDisplay = document.getElementById("loggedUserDisplay");

    // ====== STATE ======
    let abortController = null;
    let conversation = [];   // { role: "user" | "assistant", content }

    // ====== AUTH ======
    function isAuth() { return sessionStorage.getItem(SESS_AUTH) === "true"; }
    function doAuth(u) {
      sessionStorage.setItem(SESS_AUTH, "true");
      sessionStorage.setItem(SESS_USER, u);
    }
    function clearAuth() {
      sessionStorage.removeItem(SESS_AUTH);
      sessionStorage.removeItem(SESS_USER);
    }
    function currUser() { return sessionStorage.getItem(SESS_USER) || ""; }

    function showLogin() { loginPanel.classList.remove("hidden"); chatPanel.classList.add("hidden"); clearAuth(); }
    function showChat() {
      loginPanel.classList.add("hidden");
      chatPanel.classList.remove("hidden");
      loggedUserDisplay.textContent = currUser() ? `· ${currUser()}` : "";
      userInput.focus();
    }

    if (isAuth()) showChat();

    loginBtn.onclick = () => {
      const u = usernameInput.value.trim(), k = keyInput.value.trim();
      if (!u || !k) { loginError.textContent = "Both fields required."; return; }
      if (AUTH[u] === k) {
        doAuth(u);
        showChat();
        loginError.textContent = "";
        conversation = [];
      } else {
        loginError.textContent = "Invalid credentials.";
      }
    };
    keyInput.addEventListener("keypress", e => { if (e.key === "Enter") loginBtn.click(); });

    logoutBtn.onclick = () => {
      if (abortController) abortController.abort();
      showLogin();
      outputArea.innerHTML = "";
      statusBar.textContent = "Ready";
      conversation = [];
    };

    // ====== HELPERS ======
    function appendMsg(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      outputArea.appendChild(div);
      outputArea.scrollTop = outputArea.scrollHeight;
      return div;
    }

    // ====== SEND MESSAGE (GPT-5.5 via unlimited.surf) ======
    async function sendMessage() {
      const rawMsg = userInput.value.trim();
      if (!rawMsg) return;

      if (abortController) abortController.abort();
      abortController = new AbortController();
      const signal = abortController.signal;

      userInput.value = "";
      userInput.style.height = "auto";
      sendBtn.disabled = true;
      statusBar.innerHTML = '<span class="typing-indicator"></span> Voidify is thinking...';

      appendMsg("user", rawMsg);
      conversation.push({ role: "user", content: rawMsg });

      const payload = {
        model: MODEL,
        max_tokens: 99999999,
        messages: conversation   // uses standard "user"/"assistant" roles
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "x-api-key": API_KEY,
            "anthropic-version": "2023-06-01",   // kept to satisfy the API requirement
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload),
          signal
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`API Error ${res.status}: ${errText}`);
        }

        const data = await res.json();

        // Extract reply (same logic as before)
        let reply = "";
        if (data.content && Array.isArray(data.content)) {
          reply = data.content.filter(b => b.type === "text").map(b => b.text).join("");
        } else if (data.choices?.[0]?.message?.content) {
          reply = data.choices[0].message.content;
        } else {
          reply = JSON.stringify(data);
        }

        appendMsg("assistant", reply);
        conversation.push({ role: "assistant", content: reply });
        statusBar.textContent = "Done.";
      } catch (err) {
        if (err.name === "AbortError") statusBar.textContent = "Aborted.";
        else {
          statusBar.textContent = `Error: ${err.message}`;
          appendMsg("assistant", `[Error] ${err.message}`);
        }
      } finally {
        sendBtn.disabled = false;
        abortController = null;
        userInput.focus();
      }
    }

    sendBtn.onclick = sendMessage;
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = userInput.scrollHeight + "px";
    });
  </script>
</body>
</html>
