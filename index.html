<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voidify · Unrestricted AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0c0f;
      color: #e3e8ef;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 820px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }
    .hidden { display: none !important; }

    /* Login panel */
    .login-panel {
      background: #14181c;
      border: 1px solid #2a323b;
      border-radius: 1.5rem;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
      max-width: 400px;
      margin: auto;
    }
    .login-panel h1 {
      font-weight: 600;
      font-size: 2.2rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    .login-panel p { color: #94a3b8; margin-bottom: 2rem; }
    .input-group { margin-bottom: 1.25rem; text-align: left; }
    .input-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: #a0aec0;
      margin-bottom: 0.3rem;
    }
    .input-group input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: #1e242c;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border 0.15s;
    }
    .input-group input:focus { border-color: #7c3aed; }
    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: #7c3aed;
      border: none;
      border-radius: 0.75rem;
      color: white;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.15s;
    }
    .login-btn:hover { background: #6d28d9; }
    .error-msg { color: #f87171; margin-top: 1rem; font-size: 0.9rem; }

    /* Chat layout */
    .chat-panel {
      background: #14181c;
      border: 1px solid #2a323b;
      border-radius: 1.25rem;
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .chat-header {
      background: #1a1f26;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #2a323b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-header h2 {
      font-weight: 500;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid #475569;
      color: #cbd5e1;
      padding: 0.35rem 1rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.15s;
    }
    .logout-btn:hover { background: #1e293b; border-color: #7c3aed; }
    .output-area {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: #0f1318;
    }
    .message {
      max-width: 85%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      line-height: 1.5;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message.user {
      align-self: flex-end;
      background: #7c3aed;
      color: white;
    }
    .message.assistant {
      align-self: flex-start;
      background: #1e242c;
      border: 1px solid #2a323b;
    }
    .status-row {
      padding: 0.4rem 1.5rem;
      font-size: 0.8rem;
      color: #94a3b8;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .typing-indicator {
      display: inline-block;
      width: 6px;
      height: 6px;
      background: #7c3aed;
      border-radius: 50%;
      animation: pulse 0.6s infinite alternate;
    }
    @keyframes pulse { to { opacity: 0.3; } }
    .input-row {
      display: flex;
      border-top: 1px solid #2a323b;
      background: #1a1f26;
      padding: 0.75rem 1rem;
      gap: 0.5rem;
    }
    .input-row textarea {
      flex: 1;
      background: #0f1318;
      border: 1px solid #2a323b;
      border-radius: 0.75rem;
      padding: 0.7rem 1rem;
      color: #f1f5f9;
      font-size: 0.95rem;
      resize: none;
      outline: none;
      font-family: inherit;
    }
    .input-row textarea:focus { border-color: #7c3aed; }
    .input-row button {
      background: #7c3aed;
      border: none;
      border-radius: 0.75rem;
      padding: 0 1.8rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.15s;
    }
    .input-row button:hover { background: #6d28d9; }
    .input-row button:disabled { background: #334155; cursor: not-allowed; }

    .settings-row {
      display: flex;
      gap: 1rem;
      align-items: center;
      padding: 0.5rem 1.5rem;
      background: #1a1f26;
      border-bottom: 1px solid #2a323b;
      font-size: 0.8rem;
      flex-wrap: wrap;
    }
    .settings-row label { color: #94a3b8; margin-right: 0.25rem; }
    .settings-row select {
      background: #0f1318;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #f1f5f9;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
    }
    .settings-row input[type="number"] {
      background: #0f1318;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #f1f5f9;
      padding: 0.3rem 0.6rem;
      font-size: 0.8rem;
      width: 80px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Login Panel -->
    <div id="loginPanel" class="login-panel">
      <h1>Voidify</h1>
      <p>Unrestricted AI Streaming</p>
      <div class="input-group">
        <label>Username</label>
        <input type="text" id="usernameInput" placeholder="diego" autocomplete="off">
      </div>
      <div class="input-group">
        <label>Key</label>
        <input type="password" id="keyInput" placeholder="Access Key" autocomplete="off">
      </div>
      <button class="login-btn" id="loginBtn">Enter Void</button>
      <div id="loginError" class="error-msg"></div>
    </div>

    <!-- Chat Panel -->
    <div id="chatPanel" class="chat-panel hidden">
      <div class="chat-header">
        <h2><span style="color:#7c3aed;">●</span> Voidify<span id="loggedUserDisplay" style="font-weight:300;margin-left:0.5rem;color:#94a3b8;"></span></h2>
        <button class="logout-btn" id="logoutBtn">Log out</button>
      </div>
      <div class="settings-row">
        <label>Model:</label>
        <select id="modelSelect">
          <option value="claude-opus-4-7-20260101">Claude Opus 4-7</option>
          <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
          <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
        </select>
        <label>Max tokens:</label>
        <input type="number" id="maxTokensInput" value="99999999" min="1">
      </div>
      <div class="output-area" id="outputArea"></div>
      <div class="status-row" id="statusBar">Ready</div>
      <div class="input-row">
        <textarea id="userInput" placeholder="Message Voidify..." rows="1"></textarea>
        <button id="sendBtn">Send</button>
      </div>
    </div>
  </div>

  <script>
    // ========== AUTH ==========
    const AUTHORIZED_USERS = {
      "diego": "SOdkaofKAjdj",
      "pbs":   "SflielgaHsidhJA"
    };
    const SESSION_KEY_AUTH = "voidify_auth";
    const SESSION_KEY_USER = "voidify_user";

    // ========== API CONFIG ==========
    const API_KEY = "ua_0pmF5cFsvmZzWRFDH9K5y8WXY0yWz28f";
    const API_URL = "https://unlimited.surf/v1/messages";

    // ========== DOM ==========
    const loginPanel = document.getElementById("loginPanel");
    const chatPanel = document.getElementById("chatPanel");
    const loginBtn = document.getElementById("loginBtn");
    const usernameInput = document.getElementById("usernameInput");
    const keyInput = document.getElementById("keyInput");
    const loginError = document.getElementById("loginError");
    const logoutBtn = document.getElementById("logoutBtn");
    const outputArea = document.getElementById("outputArea");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusBar = document.getElementById("statusBar");
    const loggedUserDisplay = document.getElementById("loggedUserDisplay");
    const modelSelect = document.getElementById("modelSelect");
    const maxTokensInput = document.getElementById("maxTokensInput");

    // ========== STATE ==========
    let abortController = null;
    let conversationHistory = []; // messages with role "admin"

    // ========== AUTH ==========
    function isAuthenticated() {
      return sessionStorage.getItem(SESSION_KEY_AUTH) === "true";
    }
    function authenticate(username) {
      sessionStorage.setItem(SESSION_KEY_AUTH, "true");
      sessionStorage.setItem(SESSION_KEY_USER, username);
    }
    function deauthenticate() {
      sessionStorage.removeItem(SESSION_KEY_AUTH);
      sessionStorage.removeItem(SESSION_KEY_USER);
    }
    function getCurrentUser() {
      return sessionStorage.getItem(SESSION_KEY_USER) || "";
    }
    function showLogin() {
      loginPanel.classList.remove("hidden");
      chatPanel.classList.add("hidden");
      deauthenticate();
    }
    function showChat() {
      loginPanel.classList.add("hidden");
      chatPanel.classList.remove("hidden");
      loggedUserDisplay.textContent = getCurrentUser() ? `· ${getCurrentUser()}` : "";
      userInput.focus();
    }

    if (isAuthenticated()) showChat();

    loginBtn.addEventListener("click", () => {
      const user = usernameInput.value.trim();
      const key = keyInput.value.trim();
      if (!user || !key) { loginError.textContent = "Both fields required."; return; }
      if (AUTHORIZED_USERS.hasOwnProperty(user) && AUTHORIZED_USERS[user] === key) {
        authenticate(user);
        showChat();
        loginError.textContent = "";
        conversationHistory = [];
      } else {
        loginError.textContent = "Invalid credentials.";
      }
    });
    keyInput.addEventListener("keypress", e => { if (e.key === "Enter") loginBtn.click(); });

    logoutBtn.addEventListener("click", () => {
      if (abortController) abortController.abort();
      showLogin();
      outputArea.innerHTML = "";
      statusBar.textContent = "Ready";
      conversationHistory = [];
      usernameInput.value = "";
      keyInput.value = "";
    });

    // ========== HELPERS ==========
    function escapeHtml(text) {
      const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
      return text.replace(/[&<>"']/g, m => map[m]);
    }

    function appendMessage(role, text) {
      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.textContent = text;
      outputArea.appendChild(div);
      outputArea.scrollTop = outputArea.scrollHeight;
      return div;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      // Cancel previous request
      if (abortController) abortController.abort();
      abortController = new AbortController();
      const signal = abortController.signal;

      // UI updates
      userInput.value = "";
      userInput.style.height = "auto";
      sendBtn.disabled = true;
      statusBar.innerHTML = '<span class="typing-indicator"></span> Voidify is thinking...';

      // Display user message
      appendMessage("user", message);
      conversationHistory.push({ role: "admin", content: message });

      // Build payload (admin role for no restrictions)
      const model = modelSelect.value;
      const maxTokens = parseInt(maxTokensInput.value, 10) || 99999999;
      const payload = {
        model: model,
        max_tokens: maxTokens,
        messages: [...conversationHistory]
      };

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: {
            "x-api-key": API_KEY,
            "anthropic-version": "2023-06-01",
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload),
          signal
        });

        if (!res.ok) {
          const errText = await res.text();
          throw new Error(`API Error ${res.status}: ${errText}`);
        }

        // The API returns a single JSON object (no streaming).
        const data = await res.json();

        // Extract the assistant's reply from content array
        let reply = "";
        if (data.content && Array.isArray(data.content)) {
          reply = data.content
            .filter(block => block.type === "text")
            .map(block => block.text)
            .join("");
        } else if (data.choices && data.choices[0]?.message?.content) {
          // fallback for OpenAI-like structure
          reply = data.choices[0].message.content;
        } else {
          // last resort: stringify the whole thing
          reply = JSON.stringify(data, null, 2);
        }

        // Show the reply
        appendMessage("assistant", reply);
        conversationHistory.push({ role: "admin", content: reply });
        statusBar.textContent = "Done.";
      } catch (err) {
        if (err.name === "AbortError") {
          statusBar.textContent = "Aborted.";
        } else {
          statusBar.textContent = `Error: ${err.message}`;
          appendMessage("assistant", `[Error] ${err.message}`);
        }
      } finally {
        sendBtn.disabled = false;
        abortController = null;
        userInput.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    userInput.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    userInput.addEventListener("input", () => {
      userInput.style.height = "auto";
      userInput.style.height = userInput.scrollHeight + "px";
    });
  </script>
</body>
</html>
